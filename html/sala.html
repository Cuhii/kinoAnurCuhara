<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <title>Sala</title>
    <link rel="stylesheet" href="../css/sala.css">
</head>
<body>

<nav>
    <ul>
        <li><a href="filmovi.html">Filmovi</a></li>
        <li><a href="raspored.html">Raspored</a></li>
        <li class="active-link"><a href="sala.html">Sala</a></li>
    </ul>
</nav>

<main>

    <h1>Izaberite mjesto</h1>

    <div class="info-box">
        <div class="info-item">
            <span class="label">FILM</span>
            <p id="film-naziv"></p>
        </div>
        <div class="info-item">
            <span class="label">VRIJEME</span>
            <p id="film-vrijeme"></p>
        </div>
        <div class="info-item">
            <span class="label">SALA</span>
            <p id="film-sala"></p>
        </div>
    </div>

    <div class="platno-box">
        <div class="platno-linija"></div>
        <p>PLATNO</p>
    </div>

    <!-- DINAMIČKI CRTANA SALA -->
    <div class="sala-grid">
        <div class="sjedista-wrapper"></div>
    </div>

    <!-- LEGENDA -->
    <div class="legenda">
        <div class="legenda-item">
            <span class="legenda-boja slobodno"></span>
            <span>Slobodno</span>
        </div>

        <div class="legenda-item">
            <span class="legenda-boja zauzeto"></span>
            <span>Zauzeto</span>
        </div>

        <div class="legenda-item">
            <span class="legenda-boja rezervisano"></span>
            <span>Rezervisano</span>
        </div>
    </div>

    <!-- DUGMAD -->
    <div class="projekcija-dugmad">
        <button id="prethodnaBtn">Prethodna projekcija</button>
        <button id="sljedecaBtn">Sljedeca projekcija</button>
    </div>

</main>

<script src="../scripts/app.js"></script>
<script src="../scripts/kinoSala.js"></script>

</body>
</html>
